services:
  # MySQL Database
  db:
    image: mysql:8.0
    container_name: formgrid-db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: rootpassword
      MYSQL_DATABASE: formgrid
      MYSQL_USER: app_user
      MYSQL_PASSWORD: app_password
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10

  # Redis for Queue System
  redis:
    image: redis:7-alpine
    container_name: formgrid-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      timeout: 10s
      retries: 5

  # MinIO - S3-compatible object storage (optional)
  minio:
    image: minio/minio:latest
    container_name: formgrid-minio
    restart: unless-stopped
    ports:
      - "9000:9000"  # API
      - "9001:9001"  # Console
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin123
      MINIO_DEFAULT_BUCKETS: file-uploads
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 30s
      timeout: 20s
      retries: 3

  # Backend Service
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: formgrid-backend
    restart: unless-stopped
    ports:
      - "4001:4000"
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads_data:/app/uploads  # Local file storage
      - ./uploads:/app/uploads-dev  # Development bind mount (optional)
    environment:
      - NODE_ENV=development
      - PORT=4000
      - DATABASE_URL=mysql://app_user:app_password@db:3306/formgrid
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - EMAIL_PROVIDER=resend
      - RESEND_API_KEY=${RESEND_API_KEY}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - EMAIL_FROM=${EMAIL_FROM}
      - APP_URL=http://localhost:4001
      # File Storage Configuration
      - FILE_STORAGE_TYPE=local  # Options: local, s3, gcs, minio
      - UPLOAD_PATH=/app/uploads
      - MAX_FILE_SIZE=10485760  # 10MB
      - MAX_FILES=10
      # AWS S3 Configuration (if using S3)
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-us-east-1}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      # Google Cloud Storage Configuration (if using GCS)
      - GCS_PROJECT_ID=${GCS_PROJECT_ID}
      - GCS_BUCKET_NAME=${GCS_BUCKET_NAME}
      - GOOGLE_APPLICATION_CREDENTIALS=/app/gcs-credentials.json
      # MinIO Configuration (if using MinIO)
      - MINIO_ENDPOINT=http://minio:9000
      - MINIO_ACCESS_KEY=minioadmin
      - MINIO_SECRET_KEY=minioadmin123
      - MINIO_BUCKET_NAME=file-uploads
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    command: ["npm", "run", "dev"]

  # Frontend Service
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: formgrid-frontend
    restart: unless-stopped
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - VITE_API_BASE_URL=http://localhost:4001
    depends_on:
      - backend
    command: ["npm", "run", "dev", "--", "--host"]

  # Queue Worker Service
  queue-worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: formgrid-queue-worker
    restart: unless-stopped
    volumes:
      - ./backend:/app
      - /app/node_modules
      - uploads_data:/app/uploads
    environment:
      - NODE_ENV=development
      - DATABASE_URL=mysql://app_user:app_password@db:3306/formgrid
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_DB=0
      - EMAIL_PROVIDER=resend
      - RESEND_API_KEY=${RESEND_API_KEY}
      - EMAIL_FROM=${EMAIL_FROM}
      # File Storage Configuration
      - FILE_STORAGE_TYPE=local
      - UPLOAD_PATH=/app/uploads
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    command: ["npm", "run", "worker"]

  # File Cleanup Service (optional)
  file-cleanup:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: formgrid-file-cleanup
    restart: unless-stopped
    volumes:
      - uploads_data:/app/uploads
    environment:
      - NODE_ENV=development
      - DATABASE_URL=mysql://app_user:app_password@db:3306/formgrid
      - FILE_CLEANUP_AGE_DAYS=30
      - FILE_CLEANUP_DRY_RUN=false
    env_file:
      - ./backend/.env
    depends_on:
      db:
        condition: service_healthy
    command: ["npm", "run", "cleanup"]
    profiles:
      - maintenance

volumes:
  mysql_data:
  redis_data:
  uploads_data:  # Local file storage
  minio_data:    # MinIO object storage